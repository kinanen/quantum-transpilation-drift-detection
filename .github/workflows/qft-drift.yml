name: QFT10 IQM-54 drift

# Demo branch: compile qft10 against the IQM 54-qubit Emerald device and log to
# MLflow. Commit 1 transpiles with IQM's transpiler (baseline); commit 2 bumps
# Qiskit and switches to the built-in transpiler, so its run drifts from the
# baseline. The transpiler is selected by the QSET_TRANSPILER env below.

on:
  push:
    branches: [qft10iqm54]
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      MLFLOW_EXPERIMENT_NAME: qft10-iqm54-drift
      QSET_TRANSPILER: iqm
      QSET_DRIFT_WARN: "0.10"
      QSET_DRIFT_FAIL: "0.30"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install .

      - name: Compile qft10 on Emerald (IQM-54)
        run: qset-compile circuits/qft10.qasm --backends Emerald --opt-levels 3
