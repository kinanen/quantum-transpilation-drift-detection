name: Quantum compilation CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        qiskit: ["1.4.6", "2.4.2"]
    env:
      # Runs are logged to the hosted MLflow server. Set these repository
      # secrets (Settings -> Secrets and variables -> Actions).
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      MLFLOW_EXPERIMENT_NAME: qiskit-compilation

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          pip install .
          # Override the pyproject pin so each matrix job runs one major version.
          pip install "qiskit==${{ matrix.qiskit }}"

      - name: Compile circuits against all backends
        run: |
          shopt -s nullglob
          circuits=(circuits/*.py circuits/*.qasm)
          if [ ${#circuits[@]} -eq 0 ]; then
            echo "No circuit files (*.py or *.qasm) found in circuits/" >&2
            exit 1
          fi
          for circuit in "${circuits[@]}"; do
            qset-compile "$circuit"
          done
